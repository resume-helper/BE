name: Deploy Dev Server

on:
  push:
    branches: [ dev ]

jobs:
  deploy-dev:
    name: Deploy to EC2 (dev profile)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Add runner IP to security group
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_IP/32" || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (skip test)
        run: ./gradlew build -x test

      - name: Build Docker image
        run: docker build -t atomiccv:${{ github.sha }} .

      - name: Save Docker image
        run: docker save atomiccv:${{ github.sha }} | gzip > atomiccv.tar.gz

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "atomiccv.tar.gz,scripts/deploy-dev.sh"
          target: "~/deploy"

      - name: Execute deploy-dev script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            chmod +x ~/deploy/scripts/deploy-dev.sh
            ~/deploy/scripts/deploy-dev.sh ${{ github.sha }}

      - name: Remove runner IP from security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_IP/32"
